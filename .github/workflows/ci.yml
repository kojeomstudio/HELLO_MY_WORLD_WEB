name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server-build:
    name: Build Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@3951f0dfe99a8eb0f6946b3bb0c4b1f2fac077af # v4.3.0
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('web/server/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore web/server/WebGameServer.csproj

      - name: Build server
        run: dotnet build web/server/WebGameServer.csproj --no-restore --configuration Release -warnaserror

  client-build:
    name: Build Client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601876af8c594af # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web/client

      - name: Build client
        run: npm run build --prefix web/client

  client-typecheck:
    name: Client Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601876af8c594af # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web/client

      - name: Type check
        run: npx tsc --noEmit --project web/client/tsconfig.json

  data-integrity:
    name: Data Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate JSON data files
        run: |
          ERRORS=0
          for f in web/data/*.json; do
            if ! python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "::error::Invalid JSON: $f"
              ERRORS=1
            fi
          done
          if [ $ERRORS -ne 0 ]; then
            echo "::error::Data integrity check failed"
            exit 1
          fi
          echo "All JSON data files are valid"

      - name: Check required data files exist
        run: |
          REQUIRED_FILES="blocks.json items.json mobs.json server_config.json tools.json smelting.json physics_constants.json privileges.json abm_config.json biomes.json ores.json decorations.json sounds.json game_constants.json mapgen_v7.json sky_params.json day_night_ratio.json protection.json tree_schematics.json lsystem_trees.json schematics.json formspecs.json"
          MISSING=0
          for f in $REQUIRED_FILES; do
            if [ ! -f "web/data/$f" ]; then
              echo "::error::Missing required data file: web/data/$f"
              MISSING=1
            fi
          done
          if [ $MISSING -ne 0 ]; then
            exit 1
          fi
          echo "All required data files present"

      - name: Verify block data consistency
        run: |
          python3 -c "
          import json, sys
          blocks = json.load(open('web/data/blocks.json'))['blocks']
          items = json.load(open('web/data/items.json'))['items']
          ids = sorted(int(k) for k in blocks.keys())
          for i in range(max(ids) + 1):
              if str(i) not in blocks:
                  print(f'::error::Missing block ID {i}')
                  sys.exit(1)
          for name, item in items.items():
              bid = item.get('blockId')
              if bid is not None and str(bid) not in blocks:
                  print(f'::warning::Item {name} references missing blockId {bid}')
          print(f'Block data consistent: {len(ids)} blocks, IDs 0-{max(ids)}')
          "

      - name: Verify JSON schema consistency
        run: |
          python3 -c "
          import json

          blocks = json.load(open('web/data/blocks.json'))['blocks']
          for bid, block in blocks.items():
              required = ['name', 'solid']
              for field in required:
                  if field not in block:
                      print(f'::error::Block {bid} missing required field: {field}')
              if block.get('light', 0) < 0 or block.get('light', 0) > 15:
                  print(f'::warning::Block {bid} has invalid light level: {block.get(\"light\")}')

          items = json.load(open('web/data/items.json'))
          if 'items' not in items:
              print('::error::items.json missing \"items\" key')
          if 'recipes' in items:
              for i, recipe in enumerate(items['recipes']):
                  if 'result' not in recipe or 'ingredients' not in recipe:
                      print(f'::warning::Recipe {i} missing result or ingredients')

          config = json.load(open('web/data/server_config.json'))
          for section in ['server', 'world', 'player', 'physics', 'auth', 'security']:
              if section not in config:
                  print(f'::warning::server_config.json missing section: {section}')

          print('Schema consistency checks passed')
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: []
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601876af8c594af # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json

      - name: Install dependencies for audit
        run: npm ci --prefix web/client

      - name: npm audit (client)
        run: npm audit --prefix web/client --audit-level=high

      - name: Check .NET packages for vulnerabilities
        run: dotnet list web/server/WebGameServer.csproj package --vulnerable --include-transitive || true

      - name: Check for hardcoded secrets in source
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0

          if grep -rn --include="*.cs" \
            -E '(Password\s*=\s*"[^"]+"|ApiKey\s*=\s*"[^"]+"|Secret\s*=\s*"[^"]+")' \
            web/server/ | grep -vi 'example\|placeholder\|todo\|config\|empty\|{'; then
            echo "::error::Potential hardcoded secrets found in C# source"
            FOUND=1
          fi

          if grep -rn --include="*.ts" --include="*.js" \
            -E '(API_KEY|SECRET|PASSWORD|api[_-]?key|password|secret)\s*[:=]\s*["\x27][^"\x27]+' \
            web/client/src/ | grep -vi 'example\|placeholder\|todo'; then
            echo "::error::Potential hardcoded secrets found in client source"
            FOUND=1
          fi

          if grep -rn --include="*.json" \
            -E '"(password|secret|api_key|token)":\s*"[^"]+"' \
            web/data/ | grep -vi 'example\|placeholder\|default\|empty\|changeme'; then
            echo "::error::Potential hardcoded secrets found in JSON config"
            FOUND=1
          fi

          if grep -rn --include="*.cs" --include="*.ts" --include="*.js" --include="*.json" \
            -E '(AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35}|ghp_[0-9a-zA-Z]{36})' \
            web/ 2>/dev/null; then
            echo "::error::Potential cloud/API keys detected"
            FOUND=1
          fi

          if [ $FOUND -ne 0 ]; then
            echo "::error::Hardcoded secrets detected — failing build"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Verify .gitignore covers sensitive files
        run: |
          MISSING=0
          for pattern in ".env" "*.db" "*.sqlite" "*.user" "*.suo" "node_modules" "bin/" "obj/" "dist/" "world"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "::error::.gitignore missing pattern: $pattern"
              MISSING=1
            fi
          done
          if [ $MISSING -ne 0 ]; then
            echo "::error::.gitignore is missing required patterns"
            exit 1
          fi
          echo ".gitignore verification complete"
