name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore web/server/WebGameServer.csproj

      - name: Build
        run: dotnet build web/server/WebGameServer.csproj --no-restore --configuration Release

  client:
    name: Build & Typecheck Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web/client

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: web/client

      - name: Build
        run: npm run build
        working-directory: web/client
