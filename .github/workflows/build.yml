name: Build (PR Only)

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main, develop]

jobs:
  quick-check:
    name: Quick Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore and build server
        run: |
          dotnet restore web/server/WebGameServer.csproj
          dotnet build web/server/WebGameServer.csproj --configuration Release --no-restore -warnaserror
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json
      - name: Install and build client
        run: |
          npm install --prefix web/client
          npm run build --prefix web/client
