name: Build and Test

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore web/server/WebGameServer.csproj
      - name: Build server
        run: dotnet build web/server/WebGameServer.csproj --configuration Release --no-restore

  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix web/client
      - name: Type check
        run: npx --prefix web/client tsc --noEmit --project web/client/tsconfig.json
      - name: Build client
        run: npm run build --prefix web/client

  lint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore web/server/WebGameServer.csproj
      - name: Check server build warnings
        run: dotnet build web/server/WebGameServer.csproj --configuration Release --no-restore -warnaserror
