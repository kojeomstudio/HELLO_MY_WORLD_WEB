name: Build (PR Only)

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main, develop]

jobs:
  quick-check:
    name: Quick Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0dfe99a8eb0f6946b3bb0c4b1f2fac077af # v4.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('web/server/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore and build server
        run: |
          dotnet restore web/server/WebGameServer.csproj
          dotnet build web/server/WebGameServer.csproj --configuration Release --no-restore -warnaserror
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601876af8c594af # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json
      - name: Install and build client
        run: |
          npm ci --prefix web/client
          npm run build --prefix web/client
      - name: Type check client
        run: npx tsc --noEmit --project web/client/tsconfig.json
