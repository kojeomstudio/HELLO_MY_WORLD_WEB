name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore web/server/WebGameServer.csproj
      - name: Build server
        run: dotnet build web/server/WebGameServer.csproj --configuration Release --no-restore
      - name: Check for secrets
        run: |
          ! grep -rn "password\|secret_key\|api_key\|private_key" web/ --include="*.cs" --include="*.ts" --include="*.json" -i | grep -v "placeholder\|example\|config\|//\|\/\*\|\.d\.ts" || exit 1

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix web/client
      - name: Type check
        run: npx tsc --noEmit --project web/client/tsconfig.json
      - name: Build client
        run: npm run build --prefix web/client

  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Check server build warnings
        run: dotnet build web/server/WebGameServer.csproj --configuration Release -warnaserror
